
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora Mercari Dazed Cegs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .container { width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header img { width: 100px; height: 100px; object-fit: contain; border-radius: 12px; margin-bottom: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 14px; padding: 1.25rem; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input[type=number], input[type=password] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; color: #1a1a1a; outline: none; background: #fafafa; }
    input:focus { border-color: #555; background: #fff; }
    .result-box { background: #e6f7ee; border-radius: 10px; padding: 1.25rem; text-align: center; display: none; margin-bottom: 12px; }
    .result-label { font-size: 13px; color: #1a7a42; margin-bottom: 6px; }
    .result-val { font-size: 28px; font-weight: 700; color: #1a7a42; }
    .detail-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; }
    .detail-val { font-weight: 500; color: #1a1a1a; }
    .btn { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; color: #444; cursor: pointer; }
    .btn:hover { background: #f5f5f0; }
    .btn-close { font-size: 12px; padding: 3px 12px; width: auto; }
    .senha-row { display: flex; gap: 8px; margin-top: 6px; }
    .senha-row input { flex: 1; }
    .senha-row .btn { width: auto; padding: 10px 16px; }
    .erro-senha { font-size: 12px; color: #b00020; margin-top: 6px; display: none; }
    #senha-area { display: none; margin-bottom: 12px; }
    #resultado { display: none; }
    #btn-detalhamento { display: none; margin-bottom: 12px; }
    .footer { text-align: center; margin-top: 1rem; }
  </style>
</head>

      <h1>Calculadora Mercari Dazed Cegs</h1>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Valor do produto</span>
      </div>
      <label>Valor em ienes (¥)</label>
      <input type="number" id="preco" placeholder="ex: 3000" min="0" oninput="calcular()"/>
    </div>

    <div class="result-box" id="resultado-final">
      <div class="result-label">Total em reais</div>
      <div class="result-val" id="m-brl">—</div>
    </div>

    <div id="btn-detalhamento">
      <button class="btn" onclick="abrirSenha()">Ver detalhamento</button>
    </div>

    <div id="senha-area">
      <div class="card">
        <label>Senha</label>
        <div class="senha-row">
          <input type="password" id="senha-input" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter') verificarSenha()"/>
          <button class="btn" onclick="verificarSenha()">Entrar</button>
        </div>
        <p class="erro-senha" id="senha-erro">Senha incorreta.</p>
      </div>
    </div>

    <div class="card" id="resultado">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span style="font-size:13px; font-weight:600; color:#888;">Detalhamento</span>
        <button class="btn btn-close" onclick="fecharDetalhamento()">Fechar</button>
      </div>
      <div class="detail-row"><span class="detail-label">Produto</span><span class="detail-val" id="r-produto">—</span></div>
      <div class="detail-row"><span class="detail-label">Taxa proxy (¥200)</span><span class="detail-val" id="r-taxa">—</span></div>
      <div class="detail-row"><span class="detail-label">Total em ienes</span><span class="detail-val" id="r-total-jpy">—</span></div>
    </div>

    <div class="footer">
      <span style="color:#f5f5f0; font-size:11px; cursor:default;">.</span>
    </div>
  </div>

  <script>
    var _c = [0.0360, 200, 50, 2.50, 1.50];
    var desbloqueado = false;

    function fmt(v) {
      return v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function calcular() {
      var p = parseFloat(document.getElementById('preco').value);
      var rb = document.getElementById('resultado-final');
      var bd = document.getElementById('btn-detalhamento');
      var rc = document.getElementById('resultado');
      var sa = document.getElementById('senha-area');

      if (!p || p <= 0) {
        rb.style.display = 'none';
        bd.style.display = 'none';
        rc.style.display = 'none';
        sa.style.display = 'none';
        return;
      }

      var tj = p + _c[1];
      var base = tj * _c[0];
      var total = base <= _c[2] ? base + _c[3] : base + _c[4];

      document.getElementById('m-brl').textContent = 'R$ ' + fmt(total);
      document.getElementById('r-produto').textContent = '\u00a5' + fmt(p);
      document.getElementById('r-taxa').textContent = '\u00a5' + fmt(_c[1]);
      document.getElementById('r-total-jpy').textContent = '\u00a5' + fmt(tj);

      rb.style.display = 'block';
      bd.style.display = 'block';
      if (desbloqueado) rc.style.display = 'block';
    }

    function abrirSenha() {
      document.getElementById('senha-area').style.display = 'block';
      document.getElementById('btn-detalhamento').style.display = 'none';
      document.getElementById('senha-erro').style.display = 'none';
      document.getElementById('senha-input').value = '';
      setTimeout(function(){ document.getElementById('senha-input').focus(); }, 100);
    }

    function verificarSenha() {
      var v = document.getElementById('senha-input').value;
      if (v === 'Nocaute**') {
        desbloqueado = true;
        document.getElementById('senha-area').style.display = 'none';
        document.getElementById('senha-erro').style.display = 'none';
        document.getElementById('senha-input').value = '';
        document.getElementById('resultado').style.display = 'block';
      } else {
        document.getElementById('senha-erro').style.display = 'block';
        document.getElementById('btn-detalhamento').style.display = 'block';
      }
    }

    function fecharDetalhamento() {
      desbloqueado = false;
      document.getElementById('resultado').style.display = 'none';
      document.getElementById('btn-detalhamento').style.display = 'block';
    }
  </script>
</body>
</html>
